<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Portal &mdash; The Animist Apothecary</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #FAF8F5;
      --cream-dark: #F0EDE8;
      --earth: #3D2E1F;
      --earth-mid: #6B5744;
      --earth-faint: #9A8C7A;
      --sage: #7A8B6F;
      --sage-light: #E8EDE5;
      --sage-dark: #5C6B52;
      --gold: #C4A35A;
      --gold-light: #F5EDD6;
      --rose: #C4836F;
      --rose-light: #F5E0D9;
      --white: #FFFFFF;
      --shadow-sm: 0 1px 3px rgba(61,46,31,0.06);
      --shadow-md: 0 4px 12px rgba(61,46,31,0.08);
      --radius: 10px;
      --radius-sm: 6px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      color: var(--earth);
      font-size: 14px;
      line-height: 1.5;
    }

    h1, h2, h3, h4 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
    }

    /* AUTH SCREEN */
    #auth-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--cream);
    }
    .auth-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 48px 40px;
      box-shadow: var(--shadow-md);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .auth-card h1 {
      font-size: 28px;
      color: var(--earth);
      margin-bottom: 4px;
    }
    .auth-card > p {
      color: var(--earth-faint);
      font-size: 13px;
      margin-bottom: 28px;
    }
    .auth-mode { display: none; }
    .auth-mode.active { display: block; }
    .auth-input {
      display: block;
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 14px;
      border: 1px solid var(--cream-dark);
      border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      background: var(--cream);
      color: var(--earth);
      transition: border-color 0.2s, background 0.2s;
    }
    .auth-input:focus {
      outline: none;
      border-color: var(--sage);
      background: var(--white);
    }
    .auth-btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: var(--earth);
      color: var(--cream);
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 12px;
    }
    .auth-btn:hover { background: var(--earth-mid); }
    .auth-switch {
      background: none;
      border: none;
      color: var(--sage);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      cursor: pointer;
      text-decoration: underline;
      transition: color 0.2s;
    }
    .auth-switch:hover { color: var(--sage-dark); }
    .auth-error {
      color: var(--rose);
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }

    /* NAV */
    .portal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      background: var(--white);
      border-bottom: 1px solid var(--cream-dark);
    }
    .nav-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      color: var(--earth);
      text-decoration: none;
      font-weight: 500;
    }
    .nav-brand em { font-style: italic; }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .nav-user {
      font-size: 13px;
      color: var(--earth-faint);
    }
    .sign-out-link {
      font-size: 12px;
      color: var(--sage);
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
    }
    .sign-out-link:hover { color: var(--sage-dark); }

    /* CONTAINER */
    .portal-container {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .portal-header {
      margin-bottom: 28px;
    }
    .portal-header h1 {
      font-size: 28px;
      margin-bottom: 4px;
    }
    .portal-header .subtitle {
      font-size: 13px;
      color: var(--earth-faint);
    }

    /* GRID */
    .portal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    /* CARD */
    .portal-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow-sm);
    }
    .portal-card h3 {
      font-size: 18px;
      margin-bottom: 16px;
      color: var(--earth);
    }

    /* SESSION ITEM */
    .session-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--cream-dark);
    }
    .session-item:last-child { border-bottom: none; }
    .session-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--earth);
      margin-bottom: 2px;
    }
    .session-date {
      font-size: 12px;
      color: var(--earth-faint);
    }

    /* MESSAGE ITEM */
    .message-item {
      padding: 12px 0;
      border-bottom: 1px solid var(--cream-dark);
    }
    .message-item:last-child { border-bottom: none; }
    .message-subject {
      font-size: 14px;
      font-weight: 500;
      color: var(--earth);
      margin-bottom: 2px;
    }
    .message-body {
      font-size: 13px;
      color: var(--earth-mid);
      margin-bottom: 4px;
    }
    .message-date {
      font-size: 11px;
      color: var(--earth-faint);
    }
    .unread-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--sage);
      border-radius: 50%;
      margin-left: 8px;
    }

    /* CEREMONY PROGRESS */
    .ceremony-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 4px;
    }
    .ceremony-meta {
      font-size: 12px;
      color: var(--earth-faint);
      margin-bottom: 12px;
    }
    .progress-bar-bg {
      height: 8px;
      background: var(--cream-dark);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--sage);
      border-radius: 4px;
      transition: width 0.4s ease;
    }
    .ceremony-steps {
      font-size: 12px;
      color: var(--earth-faint);
    }

    /* SEND MESSAGE */
    .send-message-form {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--cream-dark);
    }
    .send-message-form textarea {
      display: block;
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--cream-dark);
      border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      background: var(--cream);
      color: var(--earth);
      resize: vertical;
      min-height: 60px;
      margin-bottom: 10px;
      transition: border-color 0.2s, background 0.2s;
    }
    .send-message-form textarea:focus {
      outline: none;
      border-color: var(--sage);
      background: var(--white);
    }
    .send-btn {
      padding: 8px 20px;
      background: var(--sage);
      color: var(--white);
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .send-btn:hover { background: var(--sage-dark); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .send-success {
      color: var(--sage);
      font-size: 12px;
      margin-top: 8px;
      display: none;
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 24px 16px;
      color: var(--earth-faint);
      font-size: 13px;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .portal-nav {
        padding: 12px 16px;
        flex-wrap: wrap;
        gap: 8px;
      }
      .portal-container {
        padding: 20px 16px;
      }
      .portal-grid {
        grid-template-columns: 1fr;
      }
      .auth-card {
        margin: 16px;
        padding: 32px 24px;
      }
    }
  </style>
</head>
<body>

  <!-- AUTH SCREEN -->
  <div id="auth-screen">
    <div class="auth-card">
      <h1>The Animist Apothecary</h1>
      <p>Your Personal Portal</p>

      <!-- Sign In mode (default) -->
      <div id="mode-signin" class="auth-mode active">
        <input type="email" id="signin-email" class="auth-input" placeholder="Email">
        <input type="password" id="signin-password" class="auth-input" placeholder="Password">
        <button class="auth-btn" id="signin-btn">Sign In</button>
        <button class="auth-switch" id="show-signup">First time? Create Account</button>
      </div>

      <!-- Sign Up mode -->
      <div id="mode-signup" class="auth-mode">
        <input type="email" id="signup-email" class="auth-input" placeholder="Email">
        <input type="password" id="signup-password" class="auth-input" placeholder="Password">
        <input type="password" id="signup-confirm" class="auth-input" placeholder="Confirm Password">
        <button class="auth-btn" id="signup-btn">Create Account</button>
        <button class="auth-switch" id="show-signin">Already have an account? Sign In</button>
      </div>

      <div id="auth-error" class="auth-error"></div>
    </div>
  </div>

  <!-- DASHBOARD SCREEN -->
  <div id="dashboard-screen" style="display:none;">
    <nav class="portal-nav">
      <a href="/portal/" class="nav-brand">The Animist <em>Apothecary</em></a>
      <div class="nav-right">
        <span class="nav-user" id="nav-user"></span>
        <button class="sign-out-link" id="sign-out-btn">Sign Out</button>
      </div>
    </nav>

    <div class="portal-container">
      <div class="portal-header">
        <h1 id="welcome-greeting">Welcome back</h1>
        <p class="subtitle" id="portal-subtitle"></p>
      </div>

      <!-- Row 1: Appointments + Messages -->
      <div class="portal-grid">
        <div class="portal-card">
          <h3>Upcoming Sessions</h3>
          <div id="appointments-list">
            <div class="empty-state">No upcoming appointments</div>
          </div>
        </div>
        <div class="portal-card">
          <h3>Messages from Practitioner</h3>
          <div id="messages-list">
            <div class="empty-state">No messages</div>
          </div>
          <div class="send-message-form">
            <textarea id="message-text" placeholder="Write a message to your practitioner..."></textarea>
            <button class="send-btn" id="send-message-btn">Send Message</button>
            <div class="send-success" id="send-success">Message sent</div>
          </div>
        </div>
      </div>

      <!-- Row 2: Ceremony Progress -->
      <div class="portal-card">
        <h3>Ceremony Progress</h3>
        <div id="ceremony-card">
          <div class="empty-state">No active ceremony</div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://wdecjlrfulsdklqeetqb.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndkZWNqbHJmdWxzZGtscWVldHFiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwODQwMTQsImV4cCI6MjA4ODY2MDAxNH0.mIBgkpU24IgxnzS8kR06FOL6_1Z9NmaEDe9z36CxtHs';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ── DOM refs ──
    const authScreen = document.getElementById('auth-screen');
    const dashboardScreen = document.getElementById('dashboard-screen');
    const authError = document.getElementById('auth-error');
    const modeSignin = document.getElementById('mode-signin');
    const modeSignup = document.getElementById('mode-signup');

    // ── Helpers ──
    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    function fmtDate(dateStr) {
      if (!dateStr) return '';
      return new Date(dateStr).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    }

    function fmtDateTime(dateStr) {
      if (!dateStr) return '';
      const dt = new Date(dateStr);
      const date = dt.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
      const time = dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      return date + ' at ' + time;
    }

    function showError(msg) {
      authError.textContent = msg;
      authError.style.display = 'block';
    }

    function clearError() {
      authError.textContent = '';
      authError.style.display = 'none';
    }

    // ── Mode switching ──
    document.getElementById('show-signup').addEventListener('click', () => {
      clearError();
      modeSignin.classList.remove('active');
      modeSignup.classList.add('active');
      document.getElementById('signup-email').focus();
    });

    document.getElementById('show-signin').addEventListener('click', () => {
      clearError();
      modeSignup.classList.remove('active');
      modeSignin.classList.add('active');
      document.getElementById('signin-email').focus();
    });

    // ── Sign In ──
    document.getElementById('signin-btn').addEventListener('click', async () => {
      clearError();
      const email = document.getElementById('signin-email').value.trim();
      const password = document.getElementById('signin-password').value;
      if (!email || !password) {
        showError('Please enter both email and password');
        return;
      }
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        showError(error.message);
      }
    });

    // ── Sign Up ──
    document.getElementById('signup-btn').addEventListener('click', async () => {
      clearError();
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      const confirm = document.getElementById('signup-confirm').value;

      if (!email || !password || !confirm) {
        showError('Please fill in all fields');
        return;
      }
      if (password !== confirm) {
        showError('Passwords do not match');
        return;
      }
      if (password.length < 6) {
        showError('Password must be at least 6 characters');
        return;
      }

      // Check if email exists in clients table
      const { data: clientCheck, error: checkError } = await supabase
        .from('clients')
        .select('id')
        .eq('email', email)
        .eq('is_archived', false)
        .single();

      if (checkError || !clientCheck) {
        showError('Email not found in our client records. Please contact your practitioner to get started.');
        return;
      }

      const { error } = await supabase.auth.signUp({ email, password });
      if (error) {
        showError(error.message);
      } else {
        showError('');
        authError.style.display = 'block';
        authError.style.color = 'var(--sage)';
        authError.textContent = 'Account created! Please check your email to confirm, then sign in.';
      }
    });

    // ── Sign Out ──
    document.getElementById('sign-out-btn').addEventListener('click', async () => {
      await supabase.auth.signOut();
      window.location.reload();
    });

    // ── Send Message ──
    document.getElementById('send-message-btn').addEventListener('click', async () => {
      const textarea = document.getElementById('message-text');
      const body = textarea.value.trim();
      if (!body || !window._clientId) return;

      const btn = document.getElementById('send-message-btn');
      btn.disabled = true;

      const { error } = await supabase.from('client_messages').insert({
        client_id: window._clientId,
        body: body,
        sender_type: 'client',
        subject: 'Message from client'
      });

      btn.disabled = false;

      if (error) {
        console.error('Error sending message:', error);
        return;
      }

      textarea.value = '';
      const success = document.getElementById('send-success');
      success.style.display = 'block';
      setTimeout(() => { success.style.display = 'none'; }, 3000);
    });

    // ── Auth state listener ──
    supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' && session) {
        loadPortal(session);
      }
    });

    // ── Init ──
    async function init() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        authScreen.style.display = 'flex';
        return;
      }
      await loadPortal(session);
    }

    async function loadPortal(session) {
      const email = session.user.email;

      // Find client by email match
      const { data: client, error: clientError } = await supabase
        .from('clients')
        .select('id, full_name, display_name, email, phone, pipeline_stage')
        .eq('email', email)
        .eq('is_archived', false)
        .single();

      if (clientError || !client) {
        showError('No client profile found for ' + email + '. Please contact your practitioner.');
        authScreen.style.display = 'flex';
        return;
      }

      // Store client ID for messaging
      window._clientId = client.id;

      // Show dashboard
      authScreen.style.display = 'none';
      dashboardScreen.style.display = 'block';

      const displayName = client.display_name || client.full_name || 'Friend';
      const firstName = displayName.split(' ')[0];

      document.getElementById('welcome-greeting').textContent = 'Welcome back, ' + firstName;
      document.getElementById('nav-user').textContent = displayName;

      // Load data
      await Promise.all([
        loadAppointments(client.id),
        loadMessages(client.id),
        loadCeremony(client.id),
      ]);

      // Real-time subscriptions
      setupRealtime(client.id);
    }

    // ── Appointments ──
    async function loadAppointments(clientId) {
      try {
        const { data, error } = await supabase
          .from('appointments')
          .select('id, title, scheduled_at, location, meeting_type, service_id, services(name)')
          .eq('client_id', clientId)
          .gte('scheduled_at', new Date().toISOString())
          .order('scheduled_at', { ascending: true })
          .limit(5);

        if (error) throw error;

        const container = document.getElementById('appointments-list');
        if (!data || data.length === 0) return;

        container.innerHTML = data.map(a => {
          const title = a.title || a.services?.name || 'Session';
          const loc = a.location || a.meeting_type || '';
          return `<div class="session-item">
            <div>
              <div class="session-name">${escapeHtml(title)}</div>
              <div class="session-date">${fmtDateTime(a.scheduled_at)}${loc ? ' &middot; ' + escapeHtml(loc) : ''}</div>
            </div>
          </div>`;
        }).join('');
      } catch (err) {
        console.error('Error loading appointments:', err);
      }
    }

    // ── Messages ──
    async function loadMessages(clientId) {
      try {
        const { data, error } = await supabase
          .from('client_messages')
          .select('id, subject, body, sender_name, sender_type, created_at, is_read')
          .eq('client_id', clientId)
          .order('created_at', { ascending: false })
          .limit(10);

        if (error) throw error;

        const container = document.getElementById('messages-list');
        if (!data || data.length === 0) return;

        container.innerHTML = data.map(m => {
          const unread = !m.is_read && m.sender_type === 'practitioner' ? '<span class="unread-dot"></span>' : '';
          const fromLabel = m.sender_type === 'client' ? 'You' : (m.sender_name || 'Practitioner');
          const bodyPreview = m.body ? (m.body.length > 100 ? m.body.substring(0, 100) + '...' : m.body) : '';
          return `<div class="message-item">
            <div class="message-subject">${escapeHtml(m.subject || 'Message')}${unread}</div>
            ${bodyPreview ? `<div class="message-body">${escapeHtml(bodyPreview)}</div>` : ''}
            <div class="message-date">${escapeHtml(fromLabel)} &middot; ${fmtDate(m.created_at)}</div>
          </div>`;
        }).join('');
      } catch (err) {
        console.error('Error loading messages:', err);
      }
    }

    // ── Ceremony ──
    async function loadCeremony(clientId) {
      try {
        const { data, error } = await supabase
          .from('ceremony_participants')
          .select('id, current_step, status, completed_steps, ceremony_groups(id, name, ceremony_date, location)')
          .eq('client_id', clientId)
          .eq('status', 'active')
          .order('created_at', { ascending: false })
          .limit(1)
          .single();

        if (error || !data) return;

        const group = data.ceremony_groups;
        if (!group) return;

        const currentStep = data.current_step || 0;
        const pct = Math.round((currentStep / 10) * 100);

        const container = document.getElementById('ceremony-card');
        container.innerHTML = `
          <div class="ceremony-title">${escapeHtml(group.name || 'Ceremony')}</div>
          <div class="ceremony-meta">${fmtDate(group.ceremony_date)}${group.location ? ' &middot; ' + escapeHtml(group.location) : ''}</div>
          <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%;"></div></div>
          <div class="ceremony-steps">${currentStep} of 10 preparation steps complete</div>
        `;

        document.getElementById('portal-subtitle').textContent =
          group.name + ' — Step ' + currentStep + ' of 10';
      } catch (err) {
        console.error('Error loading ceremony:', err);
      }
    }

    // ── Real-time ──
    function setupRealtime(clientId) {
      supabase.channel('portal-realtime')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'appointments', filter: `client_id=eq.${clientId}` }, () => {
          loadAppointments(clientId);
        })
        .on('postgres_changes', { event: '*', schema: 'public', table: 'client_messages', filter: `client_id=eq.${clientId}` }, () => {
          loadMessages(clientId);
        })
        .on('postgres_changes', { event: '*', schema: 'public', table: 'ceremony_participants', filter: `client_id=eq.${clientId}` }, () => {
          loadCeremony(clientId);
        })
        .subscribe();
    }

    // ── Boot ──
    init();
  </script>
</body>
</html>
