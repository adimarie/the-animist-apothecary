<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <title>Page Not Found — The Animist Apothecary</title>
  <script>
    // GitHub Pages SPA routing fallback
    // When a 404 occurs, redirect to the appropriate page if known
    const path = window.location.pathname;

    // Known valid paths - redirect to their index.html
    const validPaths = {
      // Main site pages
      '/your-app': '/',
      '/': '/index.html',
      '/visiting': '/visiting/',
      '/visiting/': '/visiting/index.html',
      '/orientation': '/orientation/',
      '/orientation/': '/orientation/index.html',
      '/overnight': '/overnight/',
      '/overnight/': '/overnight/index.html',
      '/worktrade': '/worktrade/',
      '/worktrade/': '/worktrade/index.html',
      '/contact': '/contact/',
      '/contact/': '/contact/index.html',
      // Hidden pages
      '/welcome': '/welcome/',
      '/welcome/': '/welcome/index.html',
      '/photos': '/photos/',
      '/photos/': '/photos/index.html',
      '/sundays': '/sundays/',
      '/sundays/': '/sundays/index.html',
      '/visiting-1': '/visiting-1/',
      '/visiting-1/': '/visiting-1/index.html',
      // Mistiq subsite
      '/mistiq': '/mistiq/',
      '/mistiq/': '/mistiq/index.html',
      '/mistiq/apply': '/mistiq/apply/',
      '/mistiq/apply/': '/mistiq/apply/index.html',
      // Spaces app
      '/spaces': '/spaces/',
      '/spaces/': '/spaces/index.html',
      '/spaces/admin': '/spaces/admin/',
      '/spaces/admin/': '/spaces/admin/index.html',
      '/spaces/events': '/spaces/hostevent/',
      '/spaces/events/': '/spaces/hostevent/',
      '/spaces/hostevent': '/spaces/hostevent/',
      '/spaces/hostevent/': '/spaces/hostevent/index.html',
      '/login': '/login/',
      '/login/': '/login/index.html',
      // Tesla OAuth callback
      '/auth/tesla/callback': '/auth/tesla/callback.html',
      // Kiosk/display
      '/kioskhall': '/kioskhall/',
      '/kioskhall/': '/kioskhall/index.html',
      // Claude sessions
      '/sessions': '/rahulio/pages/claudesessions/',
      '/sessions/': '/rahulio/pages/claudesessions/',
      // Animist Apothecary public pages
      '/about': '/about.html',
      '/book': '/book.html',
      '/begin-here': '/book.html',
      '/deep-work': '/deep-work.html',
      '/shamanic-bodywork': '/shamanic-bodywork.html',
      '/personal-immersions': '/personal-immersions.html',
      '/ceremonial-therapeutics': '/ceremonial-therapeutics.html',
      '/platicas': '/platicas.html',
      '/divinations': '/divinations.html',
      '/private-group-ceremonies': '/private-group-ceremonies.html',
      '/mythopoetic': '/mythopoetic.html',
      '/mythopoetic-living': '/mythopoetic.html',
      '/sacred-reciprocity': '/sacred-reciprocity.html',
      '/the-living-web': '/community.html',
      '/community-hubs': '/community.html',
      '/ceremonialist-training': '/community.html#training',
      '/newsletter': '/community.html#newsletter',
      '/community': '/community.html',
      '/community/': '/community.html',
      '/events': '/events/',
      '/events/': '/events/index.html',
      '/offerings': '/offerings/',
      '/offerings/': '/offerings/index.html',
      '/hearth': '/hearth.html',
      '/ceremony-prep': '/ceremony-prep.html',
    };

    // Reserved top-level paths (existing directories/files — never treat as user slugs)
    const RESERVED_PATHS = [
      'spaces', 'residents', 'associates', 'login', 'shared', 'mobile',
      'supabase', 'auth', 'scripts', 'visiting', 'visiting-1', 'lost',
      'index', 'directory', 'kioskhall', 'welcome', 'photos', 'sundays',
      'orientation', 'overnight', 'worktrade', 'contact', 'community',
      'events', 'mistiq', 'docs', 'assets', 'styles',
      'bug-reporter-extension', 'bug-reporter-firefox', 'bug-fixer',
      'feature-builder', 'camera-event-poller', 'image-gen',
      'lg-poller', 'tesla-poller', 'spirit-whisper-worker',
      'migrations', '.well-known', 'your-app', 'sessions',
      'about', 'book', 'begin-here', 'deep-work', 'shamanic-bodywork',
      'personal-immersions', 'ceremonial-therapeutics', 'platicas',
      'divinations', 'private-group-ceremonies', 'mythopoetic',
      'sacred-reciprocity', 'offerings', 'ceremony', 'portal', 'admin',
      'hearth', 'intake', 'practice', 'pay', 'waiver', 'experiences',
      'ceremony-prep'
    ];

    // Check if it's a known path (preserve query params AND hash for OAuth callbacks)
    if (validPaths[path]) {
      window.location.replace(validPaths[path] + window.location.search + window.location.hash);
    } else {
      // Check if this is a user slug (single root-level segment like /haydn)
      const segments = path.replace(/^\/|\/$/g, '').split('/');
      if (segments.length === 1 && segments[0] && !RESERVED_PATHS.includes(segments[0].toLowerCase())) {
        // Looks like a personal directory URL — redirect to directory template
        window.location.replace('/directory/?slug=' + encodeURIComponent(segments[0].toLowerCase()));
      } else {
        // Unknown path — show the 404 page
        document.getElementById('notFoundPage').style.display = 'flex';
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap');

    :root {
      --cream: #F7F5F0;
      --cream-dark: #EFEDE6;
      --earth: #2D2A26;
      --earth-light: #5A5650;
      --sage: #5B7553;
      --sage-dark: #4A6344;
      --gold: #9e8b6e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--cream);
      color: var(--earth);
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
    }

    #notFoundPage {
      display: none;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      flex-direction: column;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding: 2rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    .logo-text {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.6rem;
      font-weight: 500;
      color: var(--earth);
      letter-spacing: 0.02em;
    }

    .logo-accent {
      font-style: italic;
      color: var(--sage);
    }

    .code {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 5rem;
      font-weight: 300;
      color: var(--sage);
      line-height: 1;
    }

    .message {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.35rem;
      color: var(--earth-light);
      font-style: italic;
    }

    .quote-card {
      background: var(--cream-dark);
      border-radius: 8px;
      padding: 1.5rem 1.75rem;
      text-align: center;
      width: 100%;
      border: 1px solid rgba(139,115,85,0.1);
    }

    .quote-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      color: var(--gold);
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    .quote-text {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.05rem;
      line-height: 1.6;
      color: var(--earth-light);
      font-style: italic;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--sage);
      border: 1px solid var(--sage);
      border-radius: 2px;
      padding: 0.75rem 2rem;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--cream);
      font-weight: 500;
      text-decoration: none;
      transition: all 0.35s ease;
    }

    .nav-link:hover {
      background: var(--sage-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(91,117,83,0.25);
    }

    .footer {
      font-size: 0.7rem;
      color: var(--earth-light);
      opacity: 0.5;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div id="notFoundPage">
    <div class="container">
      <div class="logo-text">The Animist <em class="logo-accent">Apothecary</em></div>

      <div class="code">404</div>
      <p class="message">This page could not be found.</p>

      <div class="quote-card">
        <div class="quote-label">A Thought for the Path</div>
        <p class="quote-text" id="quoteText">Not all who wander are lost — but sometimes the trail simply ends, and a new one begins.</p>
      </div>

      <a href="/" class="nav-link">Return Home</a>

      <div class="footer">
        Adi Marie &middot; Topanga Canyon
      </div>
    </div>
  </div>

  <script>
    const quotes = [
      "Not all who wander are lost — but sometimes the trail simply ends, and a new one begins.",
      "The earth remembers every footstep. Perhaps this path is asking you to walk a different way.",
      "In the space between seeking and finding, there is medicine.",
      "Sometimes the door we knock on is not the door we are meant to enter.",
      "The roots of the oak do not apologize for growing in unexpected directions.",
      "What you are looking for may be looking for you — just along a different trail.",
      "Even in the forest, not every path leads where you expect. That is part of the journey.",
      "Rest here a moment. Then follow the thread that feels most alive.",
    ];
    const el = document.getElementById('quoteText');
    if (el) el.textContent = quotes[Math.floor(Math.random() * quotes.length)];
  </script>
</body>
</html>
